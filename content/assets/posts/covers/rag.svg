<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fa709a" stop-opacity="1" />
      <stop offset="100%" stop-color="#fee140" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ragGrad)" />

  <g transform="translate(300, 280)" fill="white">
    <rect x="-60" y="-80" width="120" height="30" rx="5" opacity="0.3" />
    <rect x="-60" y="-40" width="120" height="30" rx="5" opacity="0.3" />
    <rect x="-60" y="0" width="120" height="30" rx="5" opacity="0.3" />
    <rect x="-60" y="40" width="120" height="30" rx="5" opacity="0.3" />
    <text x="0" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" font-weight="bold">Knowledge Base</text>
  </g>

  <!-- 线段 + 箭头多边形（避免 marker 外链 img 兼容性） -->
  <g opacity="0.85" stroke="none" fill="white">
    <path d="M360 274h144v12H360z" />
    <path d="M504 267l18 13-18 13z" />
  </g>

  <g transform="translate(700, 280)" fill="white">
    <circle cx="0" cy="0" r="70" opacity="0.3" />
    <text x="0" y="10" font-family="system-ui, Segoe UI, Arial, Helvetica, sans-serif" font-size="32" text-anchor="middle" font-weight="bold">LLM</text>
    <text x="0" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" font-weight="bold">Generator</text>
  </g>

  <g transform="translate(150, 150)">
    <path d="M0 0h100l10 10v30H0z" fill="white" opacity="0.3" />
    <text x="55" y="27" fill="white" font-family="system-ui, Segoe UI, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Query</text>
  </g>

  <g transform="translate(900, 280)">
    <rect x="0" y="-30" width="150" height="60" rx="8" fill="white" opacity="0.3" />
    <text x="75" y="5" fill="white" font-family="system-ui, Segoe UI, Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" font-weight="bold">Answer</text>
  </g>

  <text x="600" y="500" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="48" text-anchor="middle" font-weight="bold">RAG</text>
  <text x="600" y="550" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" text-anchor="middle" opacity="0.95">Retrieval-augmented generation</text>
</svg>
