<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sftGrad)"/>

  <!-- Neural network nodes -->
  <g opacity="0.3">
    <circle cx="200" cy="150" r="8" fill="white"/>
    <circle cx="300" cy="120" r="8" fill="white"/>
    <circle cx="400" cy="180" r="8" fill="white"/>
    <circle cx="500" cy="140" r="8" fill="white"/>
    <circle cx="600" cy="200" r="8" fill="white"/>
    <line x1="200" y1="150" x2="300" y2="120" stroke="white" stroke-width="2"/>
    <line x1="300" y1="120" x2="400" y2="180" stroke="white" stroke-width="2"/>
    <line x1="400" y1="180" x2="500" y2="140" stroke="white" stroke-width="2"/>
    <line x1="500" y1="140" x2="600" y2="200" stroke="white" stroke-width="2"/>
  </g>

  <!-- Main icon: Fine-tuning symbol -->
  <g transform="translate(500, 280)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="white" stroke-width="4" opacity="0.8"/>
    <path d="M -40,-40 L 40,40 M 40,-40 L -40,40" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="15" fill="white"/>
  </g>

  <!-- LoRA adapter representation -->
  <g transform="translate(700, 280)">
    <rect x="-30" y="-50" width="60" height="100" rx="8" fill="white" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">LoRA</text>
  </g>

  <!-- Title -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="48" fill="white" text-anchor="middle" font-weight="bold">SFT + LoRA</text>
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">微调实战与评估闭环</text>
</svg>