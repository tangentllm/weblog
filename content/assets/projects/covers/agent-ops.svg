<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#agentGrad)"/>

  <!-- Agent nodes -->
  <g transform="translate(600, 200)">
    <!-- Planner -->
    <circle cx="-200" cy="0" r="50" fill="white" opacity="0.3"/>
    <text x="-200" y="5" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Planner</text>

    <!-- Analyst -->
    <circle cx="0" cy="-80" r="50" fill="white" opacity="0.3"/>
    <text x="0" y="-75" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Analyst</text>

    <!-- Writer -->
    <circle cx="200" cy="0" r="50" fill="white" opacity="0.3"/>
    <text x="200" y="5" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Writer</text>

    <!-- Supervisor -->
    <circle cx="0" cy="80" r="50" fill="white" opacity="0.3"/>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Supervisor</text>
  </g>

  <!-- Connection lines -->
  <g stroke="white" stroke-width="3" opacity="0.5" fill="none">
    <line x1="400" y1="200" x2="550" y2="120"/>
    <line x1="600" y1="120" x2="750" y2="200"/>
    <line x1="800" y1="200" x2="650" y2="280"/>
    <line x1="600" y1="280" x2="450" y2="200"/>
    <line x1="550" y1="120" x2="650" y2="280"/>
    <line x1="750" y1="200" x2="450" y2="200"/>
  </g>

  <!-- Workflow arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white" opacity="0.7"/>
    </marker>
  </defs>
  <path d="M 300,400 L 500,400" stroke="white" stroke-width="4" opacity="0.6" marker-end="url(#arrow)"/>
  <path d="M 520,400 L 720,400" stroke="white" stroke-width="4" opacity="0.6" marker-end="url(#arrow)"/>
  <path d="M 740,400 L 940,400" stroke="white" stroke-width="4" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.8">Plan</text>
  <text x="620" y="440" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.8">Analyze</text>
  <text x="840" y="440" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.8">Report</text>

  <!-- Title -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="46" fill="white" text-anchor="middle" font-weight="bold">Multi-Agent Ops</text>
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.9">运营自动化协同系统</text>
</svg>