    .hljs-keyword { color: #c678dd; }

    .hljs-number { color: #d19a66; }
    .hljs-comment { color: #5c6370; font-style: italic; }
    .hljs-function { color: #61afef; }
    .hljs-title { color: #61afef; }
    .hljs-params { color: #abb2bf; }
    .hljs-built_in { color: #e5c07b; }
    .hljs-attr { color: #d19a66; }
    .hljs-variable { color: #e06c75; }
    .hljs-operator { color: #56b6c2; }
    .hljs-literal { color: #d19a66; }
    .hljs-type { color: #e5c07b; }
    html:not(.dark) .hljs-keyword { color: #a626a4; }
    html:not(.dark) .hljs-string { color: #50a14f; }
    html:not(.dark) .hljs-number { color: #986801; }
    html:not(.dark) .hljs-comment { color: #a0a1a7; }
    html:not(.dark) .hljs-function { color: #4078f2; }
    html:not(.dark) .hljs-title { color: #4078f2; }
    html:not(.dark) .hljs-params { color: #383a42; }
    html:not(.dark) .hljs-built_in { color: #c18401; }
    html:not(.dark) .hljs-attr { color: #986801; }

</head>

/* ============================
   工具函数
   ============================ */
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
}

function getCategoryIcon(name) {
  const cat = categories.find(c => c.name === name);
  return cat ? cat.icon : 'tag';
}

function getProjectYear(periodText) {
  const matched = (periodText || '').match(/\d{4}/);
  return matched ? matched[0] : '未知';
}

function stripFrontmatter(markdownText) {
  if (!markdownText || !markdownText.startsWith('---')) return markdownText || '';
  const matched = markdownText.match(/^---[\s\S]*?---\s*/);
  return matched ? markdownText.slice(matched[0].length) : markdownText;
}

function estimateReadTimeFromMarkdown(markdownText) {
  const plainText = (markdownText || '')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`[^`]*`/g, ' ')
    .replace(/!\[[^\]]*\]\([^)]+\)/g, ' ')
    .replace(/\[[^\]]*\]\([^)]+\)/g, ' ')
    .replace(/[^\u4e00-\u9fa5A-Za-z0-9\s]/g, ' ');
  const tokens = plainText.trim().split(/\s+/).filter(Boolean).length;
  const minutes = Math.max(3, Math.ceil(tokens / 220));
  return `${minutes} min`;
}

function buildExcerptFromMarkdown(markdownText) {
  const noCode = (markdownText || '').replace(/```[\s\S]*?```/g, ' ');
  const plain = noCode
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/>\s?/g, '')
    .replace(/[*_`~\-]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  return plain.slice(0, 92) + (plain.length > 92 ? '...' : '');
}

function normalizeLoadedPost(item, markdownText, index) {
  const safeSlug = item.slug || `post-${index + 1}`;
  const contentMarkdown = stripFrontmatter(markdownText);
  return {
    slug: safeSlug,
    title: item.title || safeSlug,
    excerpt: item.excerpt || buildExcerptFromMarkdown(contentMarkdown),
    date: item.date || '2025-01-01',
    readTime: item.readTime || estimateReadTimeFromMarkdown(contentMarkdown),
    tags: Array.isArray(item.tags) ? item.tags : [],
    category: item.category || '随想与思考',
    pinned: Boolean(item.pinned),
    cover: item.cover || `https://picsum.photos/seed/${safeSlug}/800/400.jpg`,
    content: typeof marked === 'undefined'
      ? contentMarkdown
      : marked.parse(contentMarkdown),
  };
}

function normalizeLoadedProject(item, markdownText, index) {
  const safeSlug = item.slug || `project-${index + 1}`;
  const contentMarkdown = stripFrontmatter(markdownText);
  const contentHtml = typeof marked === 'undefined'
    ? contentMarkdown
    : marked.parse(contentMarkdown);
  return {
    slug: safeSlug,
    title: item.title || safeSlug,
    subtitle: item.subtitle || '',
    cover: item.cover || `https://picsum.photos/seed/${safeSlug}/1200/700`,
    status: item.status || '进行中',
    period: item.period || '2026',
    tags: Array.isArray(item.tags) ? item.tags : [],
    summary: item.summary || buildExcerptFromMarkdown(contentMarkdown),
    architecture: Array.isArray(item.architecture) ? item.architecture : [],
    features: Array.isArray(item.features) ? item.features : [],
    metrics: Array.isArray(item.metrics) ? item.metrics : [],
    screenshots: Array.isArray(item.screenshots) ? item.screenshots : [],
    links: typeof item.links === 'object' && item.links
      ? item.links
      : { github: '#', demo: '#', docs: '#' },
    content: contentHtml,
    rawMarkdown: markdownText || '',
  };
}

function applyPostDerivedState() {
  const categoryCountMap = posts.reduce((acc, post) => {
    acc[post.category] = (acc[post.category] || 0) + 1;
    return acc;
  }, {});
  categories.forEach((cat) => {
    cat.count = categoryCountMap[cat.name] || 0;
  });

  const hasPinned = posts.some((post) => post.pinned);
  if (!hasPinned) {
    posts
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .forEach((post, idx) => {
        post.pinned = idx < 2;
      });
  }
}

async function loadPostsFromManifest() {
  const response = await fetch(postDataSource.manifestPath, {
    cache: 'no-store',
  });
  if (!response.ok) {
    throw new Error(`manifest load failed: ${response.status}`);
  }

  const manifest = await response.json();
  if (!Array.isArray(manifest) || manifest.length === 0) {
    throw new Error('manifest empty');
  }

  const fetchedPosts = await Promise.all(
    manifest.map(async (item, index) => {
      if (!item.file) return normalizeLoadedPost(item, '', index);
      const markdownResponse = await fetch(item.file, { cache: 'no-store' });
      const markdownText = markdownResponse.ok
        ? await markdownResponse.text()
        : '';
      return normalizeLoadedPost(item, markdownText, index);
    }),
  );
  posts = fetchedPosts;
  applyPostDerivedState();
}

async function loadProjectsFromManifest() {
  const response = await fetch(projectDataSource.manifestPath, {
    cache: 'no-store',
  });
  if (!response.ok) {
    throw new Error(`project manifest load failed: ${response.status}`);
  }

  const manifest = await response.json();
  if (!Array.isArray(manifest) || manifest.length === 0) {
    throw new Error('project manifest empty');
  }

  const fetchedProjects = await Promise.all(
    manifest.map(async (item, index) => {
      const file = item.file;
      if (!file) return normalizeLoadedProject(item, '', index);
      const markdownResponse = await fetch(file, { cache: 'no-store' });
      const markdownText = markdownResponse.ok
        ? await markdownResponse.text()
        : '';
      return normalizeLoadedProject(item, markdownText, index);
    }),
  );
  projectsData = fetchedProjects;
}

/* ============================
   路由系统
   ============================ */
function router() {
  const hash = location.hash || '#/';
  const app = document.getElementById('app');

  // 高亮当前导航
  document.querySelectorAll('.nav-link').forEach(link => {
    const href = link.getAttribute('href');
    if (href === hash || (hash.startsWith(href) && href !== '#/')) {
      link.classList.add('dark:text-white', 'text-[#111]', 'font-medium');
      link.classList.remove('dark:text-[#888]', 'text-[#888]');
    } else {
      link.classList.remove('dark:text-white', 'text-[#111]', 'font-medium');
      link.classList.add('dark:text-[#888]', 'text-[#888]');
    }
  });

  // 解析路由
  if (hash === '#/' || hash === '') {
    renderHome(app);
  } else if (hash.startsWith('#/post/')) {
    const slug = hash.replace('#/post/', '');
    renderPost(app, slug);
  } else if (hash === '#/categories') {
    renderCategories(app);
  } else if (hash.startsWith('#/category/')) {
    const name = decodeURIComponent(hash.replace('#/category/', ''));
    renderCategoryPosts(app, name);
  } else if (hash === '#/projects') {
    renderProjects(app);
  } else if (hash.startsWith('#/project/')) {
    const slug = hash.replace('#/project/', '');
    renderProjectDetail(app, slug);
  } else if (hash === '#/about') {
    renderAbout(app);
  } else {
    renderHome(app);
  }

  const isPostRoute = hash.startsWith('#/post/');
  const isProjectRoute = hash.startsWith('#/project/');
  const runEnhancements = () => {
    if ((isPostRoute || isProjectRoute) && typeof renderMathInElement === 'function') {
      renderMathInElement(app, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false });
    }
    if ((isPostRoute || isProjectRoute) && typeof hljs !== 'undefined') {
      app.querySelectorAll('pre code').forEach(block => { hljs.highlightElement(block); });
    }
    if (typeof lucide !== 'undefined') lucide.createIcons();
    initReveal();
    if (isPostRoute || isProjectRoute) {
      initImageLightbox();
      initPostToc();
    }
  };
  if (typeof requestIdleCallback === 'function') {
    requestIdleCallback(runEnhancements, { timeout: 120 });
  } else {
    setTimeout(runEnhancements, 30);
  }

  window.scrollTo({top: 0, behavior: 'instant'});
  // 重新触发动画
  app.style.animation = 'none';
  app.offsetHeight;
  app.style.animation = '';
}

function renderPost(app, slug) {

  const headings = [...tempDiv.querySelectorAll('h2, h3')].map((h, i) => ({
    id: 'heading-' + i,
    tag: h.tagName,
    text: h.textContent

  let contentWithIds = post.content;
  headings.forEach((h, i) => {
    const regex = new RegExp(`<${h.tag}>(.*?)</${h.tag}>`);

function renderProjects(app) {
  const hashQuery = location.hash.includes('?')

  const tagFilter = hashQuery.get('tag') || '全部';
  const yearFilter = hashQuery.get('year') || '全部';

  const statusOptions = ['全部', ...new Set(projectsData.map((project) => project.status))];
  const tagOptions = ['全部', ...new Set(projectsData.flatMap((project) => project.tags))];
  const yearOptions = ['全部', ...new Set(projectsData.map((project) => getProjectYear(project.period)))];

  const filteredProjects = projectsData.filter((project) => {
    const statusMatched = statusFilter === '全部' || project.status === statusFilter;
    const tagMatched = tagFilter === '全部' || project.tags.includes(tagFilter);
    const yearMatched = yearFilter === '全部' || getProjectYear(project.period) === yearFilter;
    return statusMatched && tagMatched && yearMatched;

          <select id="projectFilterStatus" class="w-full rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#2a2a2a] border-[#ddd] border px-3 py-2 text-sm">
            ${statusOptions.map((option) => `<option value="${option}" ${option === statusFilter ? 'selected' : ''}>${option}</option>`).join('')}
          </select>
        </label>
        <label class="text-sm dark:text-[#888] text-[#666]">
          <span class="block text-xs mb-1 dark:text-[#666] text-[#999]">按标签筛选</span>
          <select id="projectFilterTag" class="w-full rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#2a2a2a] border-[#ddd] border px-3 py-2 text-sm">
            ${tagOptions.map((option) => `<option value="${option}" ${option === tagFilter ? 'selected' : ''}>${option}</option>`).join('')}
          </select>
        </label>
        <label class="text-sm dark:text-[#888] text-[#666]">
          <span class="block text-xs mb-1 dark:text-[#666] text-[#999]">按年份筛选</span>
          <select id="projectFilterYear" class="w-full rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#2a2a2a] border-[#ddd] border px-3 py-2 text-sm">
            ${yearOptions.map((option) => `<option value="${option}" ${option === yearFilter ? 'selected' : ''}>${option}</option>`).join('')}
          </select>
        </label>
      </div>
      <div class="grid md:grid-cols-2 gap-6">
        ${filteredProjects.map((project) => `
          <a href="#/project/${project.slug}" class="reveal group block rounded-xl overflow-hidden dark:bg-[#0f0f0f] bg-white dark:border-[#1e1e1e] border-[#eee] border hover:dark:border-[#333] hover:border-[#ccc] transition-all">
            <div class="aspect-[16/10] overflow-hidden">
              <img src="${project.cover}" alt="${project.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />

            <div class="p-5">

              <p class="text-sm dark:text-[#888] text-[#777] mt-1.5">${project.subtitle}</p>
              <p class="text-sm dark:text-[#666] text-[#999] mt-3 line-clamp-2">${project.summary}</p>

    if (tagSelect.value !== '全部') next.set('tag', tagSelect.value);
    if (yearSelect.value !== '全部') next.set('year', yearSelect.value);
    const query = next.toString();
    location.hash = query ? `#/projects?${query}` : '#/projects';
  };
  statusSelect.addEventListener('change', bindFilterEvent);
  tagSelect.addEventListener('change', bindFilterEvent);
  yearSelect.addEventListener('change', bindFilterEvent);
}

// 搜索
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}
function handleSearch(query) {
  const results = document.getElementById('search-results');
  if (!query.trim()) { results.innerHTML = ''; return; }
  const q = query.toLowerCase();
  const matched = posts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.tags.some(t => t.toLowerCase().includes(q)) ||
    p.excerpt.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q)
  );
  if (matched.length === 0) {
    results.innerHTML = '<div class="p-5 text-sm dark:text-[#555] text-[#bbb] text-center">没有找到匹配的文章</div>';
    return;
  }
  results.innerHTML = matched.map(p => `
    <a href="#/post/${p.slug}" onclick="closeSearch()" class="search-item block">
      <p class="text-sm font-medium dark:text-[#ddd] text-[#333] mb-1">${p.title}</p>
      <p class="text-xs dark:text-[#666] text-[#999] line-clamp-1">${p.excerpt}</p>
      <div class="flex gap-2 mt-1.5">${p.tags.map(t => `<span class="text-[10px] dark:text-[#555] text-[#bbb]">#${t}</span>`).join('')}</div>
    </a>
  `).join('');
}

// 主题切换
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark');
  html.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.classList.remove('dark');
  else document.documentElement.classList.add('dark');
}

// 移动端菜单
function toggleMobileMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
}

// 阅读进度条
function updateProgressBar() {
  const bar = document.getElementById('progress-bar');
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  bar.style.width = progress + '%';
}

// 回到顶部
function updateBackToTop() {
  const btn = document.getElementById('back-to-top');
  if (window.scrollY > 400) btn.classList.add('show');
  else btn.classList.remove('show');
}

// 滚动渐显
function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
}

// 图片灯箱
function initImageLightbox() {
  document.querySelectorAll('.prose img').forEach(img => {
    img.addEventListener('click', () => {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = img.src;
      lb.classList.add('open');
    });
  });
}

// 文章TOC跟随
function initPostToc() {
  const sidebar = document.getElementById('toc-sidebar');
  if (!sidebar) return;
  const links = sidebar.querySelectorAll('.toc-link');
  if (links.length === 0) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = sidebar.querySelector(`[data-target="${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px' });

  links.forEach(link => {
    const target = document.getElementById(link.dataset.target);
    if (target) observer.observe(target);
  });
}

// 复制代码
function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault(); openSearch();
  }
  if (e.key === 'Escape') closeSearch();
});

// 滚动监听
let isScrollScheduled = false;
window.addEventListener('scroll', () => {
  if (isScrollScheduled) return;
  isScrollScheduled = true;
  requestAnimationFrame(() => {
    updateProgressBar();
    updateBackToTop();
    isScrollScheduled = false;
  });
}, { passive: true });

// 路由监听
window.addEventListener('hashchange', router);

// 初始化
async function initApp() {
  initTheme();
  try {
    await loadPostsFromManifest();
  } catch (error) {
    if (!postDataSource.fallbackToEmbedded) {
      posts = [];
    }
    applyPostDerivedState();
    console.log('文章自动加载失败，回退内置数据。', error);
  }
  try {
    await loadProjectsFromManifest();
  } catch (error) {
    if (!projectDataSource.fallbackToEmbedded) {
      projectsData = [];
    }
    console.log('作品自动加载失败，回退内置数据。', error);
  }
  router();
}

initApp();
</script>
