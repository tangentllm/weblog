  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Noto Serif SC"', 'Georgia', 'serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    /* === 全局过渡 === */
    html { scroll-behavior: smooth; }
    a, button, .tag, .toc-link, .search-item {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease;
    }
    body { font-family: 'DM Sans', system-ui, sans-serif; overflow-x: hidden; }
    .font-serif { font-family: 'Noto Serif SC', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* === 阅读进度条 === */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 2px; z-index: 9999;
      background: linear-gradient(90deg, #00e5a0, #00c9ff);
      width: 0%; transition: width 0.1s linear;
    }

    /* === 滚动渐显 === */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* === 页面切换动画 === */
    #app { animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* === 导航栏 === */
    .nav-blur { backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%); }

    /* === Hero 网格背景 === */
    .hero-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    html:not(.dark) .hero-grid {
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    }

    /* === 强调色光晕 === */
    .accent-glow {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* === 文章排版 === */
    .prose {
      font-family: 'Noto Serif SC', Georgia, serif;
      line-height: 1.9;
      max-width: 100%;
      word-wrap: break-word;
    }
    .prose h1 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 2rem; font-weight: 700; margin: 2em 0 1em; padding-left: 14px;
      border-left: 3px solid #00e5a0;
    }
    .prose h2 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1.5rem; font-weight: 700; margin: 2.5em 0 1em; padding-left: 14px;
      border-left: 3px solid #00e5a0;
    }
    .prose h3 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1.2rem; font-weight: 600; margin: 2em 0 0.8em;
    }
    .prose h4 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1.1rem; font-weight: 600; margin: 1.5em 0 0.6em;
    }
    .prose h5, .prose h6 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1rem; font-weight: 600; margin: 1.2em 0 0.5em;
    }
    .prose p { margin: 0 0 1.2em; }
    .prose a { color: #00e5a0; text-decoration: underline; text-underline-offset: 3px; }
    .prose strong { font-weight: 600; }
    .prose ul, .prose ol { margin: 0 0 1.2em; padding-left: 1.5em; }
    .prose li { margin-bottom: 0.4em; }
    .prose ul li { list-style: disc; }
    .prose ol li { list-style: decimal; }
    .prose pre {
      margin: 1.5em 0;
      padding: 1.2em;
      border-radius: 8px;
      overflow-x: auto;
      max-width: 100%;
    }
    .dark .prose pre { background: #111; }
    html:not(.dark) .prose pre { background: #fafafa; }
    .prose pre code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
    }
    .dark .prose pre code { color: #d4d4d4; }
    html:not(.dark) .prose pre code { color: #333; }

    /* === 行内代码 === */
    .prose code:not(pre code) {
      font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(0,229,160,0.08); color: #00e5a0;
    }
    html:not(.dark) .prose code:not(pre code) {
      background: rgba(0,180,125,0.08); color: #00a870;
    }

    /* === 代码块 === */
    .code-block { position: relative; margin: 1.5em 0; border-radius: 10px; overflow: hidden; max-width: 100%; }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
    }
    .dark .code-header { background: #1a1a1a; color: #666; }
    html:not(.dark) .code-header { background: #f0f0f0; color: #888; }
    .code-block pre {
      margin: 0 !important;
      padding: 1.2em !important;
      border-radius: 0 !important;
      background: transparent !important;
      max-width: 100%;
      overflow-x: auto;
    }
    .dark .code-block pre { background: #111 !important; }
    html:not(.dark) .code-block pre { background: #fafafa !important; }
    .code-block code {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.85rem !important;
      line-height: 1.7 !important;
      display: block;
    }
    .dark .code-block code { color: #d4d4d4 !important; }
    .copy-btn {
      padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer;
      border: none; opacity: 0.6; transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 1; }
    .dark .copy-btn { background: #333; color: #aaa; }
    html:not(.dark) .copy-btn { background: #e0e0e0; color: #555; }

    /* === 引用块 === */
    .prose blockquote {
      margin: 1.5em 0; padding: 1em 1.2em; border-radius: 0 8px 8px 0;
      border-left: 3px solid #00e5a0; font-style: italic;
    }
    .dark .prose blockquote { background: rgba(0,229,160,0.05); color: #aaa; }
    html:not(.dark) .prose blockquote { background: rgba(0,180,125,0.05); color: #666; }

    /* === 图片样式 === */
    .prose img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      cursor: zoom-in;
      transition: transform 0.2s;
      display: block;
      margin: 1.5em auto;
    }
    .prose img:hover {
      transform: scale(1.02);
    }

    /* === 表格 === */
    .prose table { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
    .prose th { text-align: left; padding: 10px 12px; font-weight: 600; }
    .prose td { padding: 10px 12px; }
    .dark .prose th { background: #1a1a1a; border-bottom: 1px solid #333; color: #ccc; }
    .dark .prose td { border-bottom: 1px solid #1e1e1e; color: #bbb; }
    .dark .prose tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    html:not(.dark) .prose th { background: #f5f5f5; border-bottom: 1px solid #ddd; color: #333; }
    html:not(.dark) .prose td { border-bottom: 1px solid #eee; color: #555; }
    html:not(.dark) .prose tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

    /* === 折叠区域 === */
    .collapse-details { margin: 1.2em 0; border-radius: 8px; overflow: hidden; }
    .dark .collapse-details { border: 1px solid #2a2a2a; }
    html:not(.dark) .collapse-details { border: 1px solid #e0e0e0; }
    .collapse-summary {
      cursor: pointer; padding: 12px 16px; font-weight: 500; font-size: 0.9rem;
      list-style: none; display: flex; align-items: center; gap: 8px; user-select: none;
    }
    .collapse-summary::-webkit-details-marker { display: none; }
    .collapse-icon {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.7em;
    }
    details[open] .collapse-icon {
      transform: rotate(90deg);
    }
    .dark .collapse-summary { background: #1a1a1a; color: #ccc; }
    .dark .collapse-summary:hover { background: #222; }
    html:not(.dark) .collapse-summary { background: #f8f8f8; color: #444; }
    html:not(.dark) .collapse-summary:hover { background: #f0f0f0; }
    .collapse-content { padding: 16px; font-size: 0.9rem; }
    .dark .collapse-content { background: #141414; color: #aaa; }
    html:not(.dark) .collapse-content { background: #fdfdfd; color: #666; }

    /* === TOC === */
    .toc-link { display: block; padding: 4px 12px; font-size: 0.8rem; color: #666; text-decoration: none; transition: color 0.2s; position: relative; }
    .toc-link:hover { color: #00e5a0; }
    .toc-link.active { color: #00e5a0; }
    html:not(.dark) .toc-link { color: #999; }
    html:not(.dark) .toc-link.active { color: #00a870; }

    .toc-nav { position: relative; }
    .toc-indicator { position: absolute; left: 0; width: 2px; background: #00e5a0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; opacity: 0; pointer-events: none; }
    html:not(.dark) .toc-indicator { background: #00a870; }

    /* === 搜索弹窗 === */
    .search-overlay { position: fixed; inset: 0; z-index: 100; display: none; align-items: flex-start; justify-content: center; padding-top: 15vh; }
    .search-overlay.open { display: flex; }
    .search-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    .search-box { position: relative; z-index: 1; width: 90%; max-width: 560px; border-radius: 12px; overflow: hidden; }
    .dark .search-box { background: #1a1a1a; border: 1px solid #333; }
    html:not(.dark) .search-box { background: #fff; border: 1px solid #ddd; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .search-input {
      width: 100%; padding: 16px 20px; border: none; outline: none; font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
    }
    .dark .search-input { background: transparent; color: #e5e5e5; }
    html:not(.dark) .search-input { background: transparent; color: #1a1a1a; }
    .search-results { max-height: 320px; overflow-y: auto; }
    .search-item { padding: 12px 20px; cursor: pointer; border-top: 1px solid; }
    .dark .search-item { border-color: #2a2a2a; }
    .dark .search-item:hover { background: #222; }
    html:not(.dark) .search-item { border-color: #eee; }
    html:not(.dark) .search-item:hover { background: #f5f5f5; }

    /* === 图片灯箱 === */
    .lightbox { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }

    /* === 回到顶部 === */
    #back-to-top {
      position: fixed; bottom: 32px; right: 32px; z-index: 90;
      width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none;
    }
    #back-to-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .dark #back-to-top { background: #1a1a1a; color: #00e5a0; border: 1px solid #333; }
    html:not(.dark) #back-to-top { background: #fff; color: #00a870; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* === 标签 === */
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem;
      font-weight: 500; text-decoration: none;
    }
    .dark .tag { background: rgba(0,229,160,0.08); color: #00e5a0; }
    html:not(.dark) .tag { background: rgba(0,180,125,0.08); color: #00a870; }
    .tag:hover { filter: brightness(1.2); }

    /* === 路线图 === */
    .roadmap-line { position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; }
    .dark .roadmap-line { background: #2a2a2a; }
    html:not(.dark) .roadmap-line { background: #e0e0e0; }
    .roadmap-dot {
      position: absolute; left: 8px; top: 4px; width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid; z-index: 1;
    }
    .roadmap-dot.done { background: #00e5a0; border-color: #00e5a0; }
    .roadmap-dot.active { border-color: #00e5a0; background: transparent; box-shadow: 0 0 0 4px rgba(0,229,160,0.15); }
    .roadmap-dot.pending { border-color: #444; background: transparent; }
    html:not(.dark) .roadmap-dot.pending { border-color: #ccc; }

    /* === 代码块复制按钮 === */

    /* 分享按钮样式 */
    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .dark .share-btn {
      border-color: #333;
      color: #666;
    }
    html:not(.dark) .share-btn {
      border-color: #ddd;
      color: #999;
    }
    .dark .share-btn:hover {
      background: #1e1e1e;
      border-color: #444;
      color: #fff;
    }
    html:not(.dark) .share-btn:hover {
      background: #f5f5f5;
      border-color: #ccc;
      color: #333;
    }

    /* Toast 动画 */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    @keyframes slideUp {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
    }

    /* === 页面切换动画 === */
    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .page-transition {
      animation: pageEnter 0.4s ease-out;
    }

    /* === 暗色模式切换动画 === */
    html {
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    /* === hljs 覆盖 === */
    .hljs-keyword { color: #c678dd; }
    .hljs-string { color: #98c379; }
    .hljs-number { color: #d19a66; }
    .hljs-comment { color: #5c6370; font-style: italic; }
    .hljs-function { color: #61afef; }
    .hljs-title { color: #61afef; }
    .hljs-params { color: #abb2bf; }
    .hljs-built_in { color: #e5c07b; }
    .hljs-attr { color: #d19a66; }
    .hljs-variable { color: #e06c75; }
    .hljs-operator { color: #56b6c2; }
    .hljs-literal { color: #d19a66; }
    .hljs-type { color: #e5c07b; }
    html:not(.dark) .hljs-keyword { color: #a626a4; }
    html:not(.dark) .hljs-string { color: #50a14f; }
    html:not(.dark) .hljs-number { color: #986801; }
    html:not(.dark) .hljs-comment { color: #a0a1a7; }
    html:not(.dark) .hljs-function { color: #4078f2; }
    html:not(.dark) .hljs-title { color: #4078f2; }
    html:not(.dark) .hljs-params { color: #383a42; }
    html:not(.dark) .hljs-built_in { color: #c18401; }
    html:not(.dark) .hljs-attr { color: #986801; }
    html:not(.dark) .hljs-variable { color: #e45649; }
    html:not(.dark) .hljs-operator { color: #0184bc; }
    html:not(.dark) .hljs-literal { color: #986801; }

    /* === 移动端菜单 === */
    .mobile-menu { display: none; }
    .mobile-menu.open { display: flex; }

    /* === 滚动条 === */
    ::-webkit-scrollbar { width: 6px; }
    .dark ::-webkit-scrollbar-track { background: #0a0a0a; }
    .dark ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    html:not(.dark) ::-webkit-scrollbar-track { background: #fafaf9; }
    html:not(.dark) ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* === 加载动画 === */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #page-loader {
      --bg-color: #050505;
    }
    html:not(.dark) #page-loader {
      --bg-color: #fafaf9;
    }

    @media (prefers-reduced-motion: reduce) {
      *, .reveal, #app { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body class="dark:bg-[#050505] bg-[#fafaf9] dark:text-[#e5e5e5] text-[#1a1a1a] min-h-screen">

  <!-- 加载动画 -->
  <div id="page-loader" style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: var(--bg-color); transition: opacity 0.3s;">
    <div style="width: 40px; height: 40px; border: 3px solid rgba(0,229,160,0.2); border-top-color: #00e5a0; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
  </div>

  <!-- 阅读进度条 -->

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
}

function getCategoryIcon(name) {

let lucideRetryCount = 0;
function renderLucideIconsSafely() {
  if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
    lucide.createIcons();
    lucideRetryCount = 0;
    return;
  }
  if (lucideRetryCount >= 10) return;
  lucideRetryCount += 1;
  setTimeout(renderLucideIconsSafely, 60);
}

function normalizeSkillToken(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[（()）\s\-_/]/g, '')
    .replace(/[^a-z0-9\u4e00-\u9fa5]/g, '');
}

function buildCoveredSkillSet() {
  const allTags = [
    ...posts.flatMap((post) => post.tags || []),
    ...projectsData.flatMap((project) => project.tags || []),
  ];
  const normalizedTags = allTags.map(normalizeSkillToken).filter(Boolean);
  const covered = new Set(normalizedTags);
  const aliasMap = {
    rag: ['检索增强生成', '向量数据库', '检索生成流程'],
    sft: ['sft监督微调', '指令微调'],
    rlhf: ['rlhf人类反馈强化学习'],
    dpo: ['模型迭代优化'],
    promptops: ['提示优化'],
    multiagent: ['multiagent系统', '协同工作流'],
    abtest: ['ab测试'],
    pytorch: ['pytorch'],
    langchain: ['langchain'],
    llamaindex: ['llamaindex'],
    functioncall: ['functioncall', 'functioncalling', 'function call', 'tool calling'],
    mcp: ['mcp', 'mcp协议', 'mcpserver', 'mcp server'],
    skill: ['skill', 'skills', 'agentskill', 'agent skill', 'cursorskills', 'cursor skills'],
    toolcalling: ['toolcalling', 'tool calling', 'function calling'],
    deepspeed: ['deepspeed'],
    peft: ['peft'],
    accelerate: ['accelerate'],
    bitsandbytes: ['bitsandbytes'],
  };
  normalizedTags.forEach((tag) => {
    Object.entries(aliasMap).forEach(([alias, linkedSkills]) => {
      if (tag.includes(normalizeSkillToken(alias))) {
        linkedSkills.forEach((skill) => covered.add(normalizeSkillToken(skill)));
      }
    });
  });
  return { covered, normalizedTags };
}

function isSkillCovered(skillLabel, coveredInfo) {
  const normalizedSkill = normalizeSkillToken(skillLabel);
  if (!normalizedSkill) return false;
  if (coveredInfo.covered.has(normalizedSkill)) return true;
  return coveredInfo.normalizedTags.some(
    (tag) => tag.includes(normalizedSkill) || normalizedSkill.includes(tag),
  );
}

// 阅读进度保存和恢复
function saveReadingProgress(slug) {
  const scrollPosition = window.scrollY;
  const progress = {
    slug: slug,
    position: scrollPosition,
    timestamp: Date.now()
  };
  localStorage.setItem(`reading_progress_${slug}`, JSON.stringify(progress));
}

function restoreReadingProgress(slug) {
  const saved = localStorage.getItem(`reading_progress_${slug}`);
  if (!saved) return;

  try {
    const progress = JSON.parse(saved);
    // 只恢复7天内的阅读进度
    const daysSince = (Date.now() - progress.timestamp) / (1000 * 60 * 60 * 24);
    if (daysSince > 7) {
      localStorage.removeItem(`reading_progress_${slug}`);
      return;
    }

    // 延迟恢复滚动位置，确保内容已渲染
    setTimeout(() => {
      window.scrollTo({
        top: progress.position,
        behavior: 'smooth'
      });
    }, 100);
  } catch (e) {
    console.error('Failed to restore reading progress:', e);
  }
}

function initReadingProgressTracking(slug) {
  let saveTimer;
  const handleScroll = () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveReadingProgress(slug);
    }, 1000); // 1秒后保存
  };

  window.addEventListener('scroll', handleScroll);

  // 页面卸载时保存
  const cleanup = () => {
    window.removeEventListener('scroll', handleScroll);
    saveReadingProgress(slug);
  };

  return cleanup;
}

function estimateReadTimeFromMarkdown(markdownText) {
  const plainText = (markdownText || '')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`[^`]*`/g, ' ')
    .replace(/!\[[^\]]*\]\([^)]+\)/g, ' ')
    .replace(/\[[^\]]*\]\([^)]+\)/g, ' ')
    .replace(/[^\u4e00-\u9fa5A-Za-z0-9\s]/g, ' ');
  const tokens = plainText.trim().split(/\s+/).filter(Boolean).length;
  const minutes = Math.max(3, Math.ceil(tokens / 220));
  return `${minutes} min`;
}

function buildExcerptFromMarkdown(markdownText) {
  const noCode = (markdownText || '').replace(/```[\s\S]*?```/g, ' ');
  const plain = noCode
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/>\s?/g, '')
    .replace(/[*_`~\-]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  return plain.slice(0, 92) + (plain.length > 92 ? '...' : '');
}

function resolveAssetUrl(inputUrl) {
  const raw = String(inputUrl || '').trim();
  if (!raw) return raw;
  if (/^(https?:|data:|blob:)/i.test(raw)) return raw;
  const cleaned = raw.replace(/^\.\//, '');
  try {
    if (window.location.protocol === 'file:') {
      const decodedPath = decodeURIComponent(window.location.pathname || '');
      const normalizedCurrent = decodedPath.replace(/\\/g, '/');
      const currentDir = normalizedCurrent.endsWith('/index.html')
        ? normalizedCurrent.slice(0, -'/index.html'.length)
        : normalizedCurrent.replace(/\/[^/]*$/, '');
      const targetPath = `${currentDir}/${cleaned.replace(/^\/+/, '')}`
        .replace(/\/{2,}/g, '/');
      return `file://${targetPath.startsWith('/') ? '' : '/'}${targetPath}`;
    }

    if (cleaned.startsWith('/')) {
      return new URL(cleaned, window.location.origin).toString();
    }

    const pathname = window.location.pathname || '/';
    const basePath = pathname.endsWith('/index.html')
      ? pathname.slice(0, -'/index.html'.length)
      : pathname.endsWith('/')
        ? pathname
        : `${pathname}/`;
    return new URL(`${basePath}${cleaned}`, window.location.origin).toString();
  } catch {
    return raw;
  }
}

function buildImageUrlCandidates(inputUrl) {
  const raw = String(inputUrl || '').trim();
  if (!raw) return [];
  if (/^(https?:|data:|blob:|file:)/i.test(raw)) return [raw];

  const cleaned = raw.replace(/^\.\//, '');
  const candidates = new Set();

  const push = (value) => {
    if (value && typeof value === 'string') candidates.add(value);
  };

  push(resolveAssetUrl(raw));
  push(`${window.location.origin}/${cleaned.replace(/^\/+/, '')}`);
  push(new URL(`/${cleaned.replace(/^\/+/, '')}`, window.location.origin).toString());

  const pathname = window.location.pathname || '/';
  const basePath = pathname.endsWith('/index.html')
    ? pathname.slice(0, -'/index.html'.length)
    : pathname.endsWith('/')
      ? pathname
      : `${pathname}/`;
  push(new URL(`${basePath}${cleaned.replace(/^\/+/, '')}`, window.location.origin).toString());

  return Array.from(candidates);
}

function installImageFallbacks(scope = document) {
  const imgs = scope.querySelectorAll('img');
  imgs.forEach((img) => {
    if (img.dataset.fallbackInstalled === '1') return;
    img.dataset.fallbackInstalled = '1';

    const original = img.getAttribute('src') || '';
    const candidates = buildImageUrlCandidates(original);
    if (candidates.length > 0) {
      img.setAttribute('src', candidates[0]);
    }

    let idx = 0;
    img.addEventListener('error', () => {
      idx += 1;
      if (idx < candidates.length) {
        img.src = candidates[idx];
        return;
      }
      img.src = buildInlineCoverDataUrl(img.alt || 'LLM Notes');
    });
  });
}

function buildInlineCoverDataUrl(titleText) {

function normalizeLoadedPost(item, markdownText, index) {
  const safeSlug = item.slug || `post-${index + 1}`;
  const contentMarkdown = stripFrontmatter(markdownText);
  return {
    slug: safeSlug,
    title: item.title || safeSlug,
    excerpt: item.excerpt || buildExcerptFromMarkdown(contentMarkdown),
    date: item.date || '2025-01-01',
    readTime: item.readTime || estimateReadTimeFromMarkdown(contentMarkdown),
    tags: Array.isArray(item.tags) ? item.tags : [],
    category: item.category || '随想与思考',
    pinned: Boolean(item.pinned),
    cover: resolveAssetUrl(item.cover || `https://picsum.photos/seed/${safeSlug}/800/400.jpg`),
    content: typeof marked === 'undefined'
      ? contentMarkdown
      : marked.parse(contentMarkdown),
  };
}

function normalizeLoadedProject(item, markdownText, index) {
  const safeSlug = item.slug || `project-${index + 1}`;
  const contentMarkdown = stripFrontmatter(markdownText);
  const contentHtml = typeof marked === 'undefined'
    ? contentMarkdown
    : marked.parse(contentMarkdown);
  return {
    slug: safeSlug,
    title: item.title || safeSlug,
    subtitle: item.subtitle || '',
    cover: resolveAssetUrl(item.cover || `https://picsum.photos/seed/${safeSlug}/1200/700`),
    status: item.status || '进行中',
    period: item.period || '2026',
    tags: Array.isArray(item.tags) ? item.tags : [],
    summary: item.summary || buildExcerptFromMarkdown(contentMarkdown),
    architecture: Array.isArray(item.architecture) ? item.architecture : [],
    features: Array.isArray(item.features) ? item.features : [],
    metrics: Array.isArray(item.metrics) ? item.metrics : [],
    screenshots: Array.isArray(item.screenshots) ? item.screenshots : [],
    links: typeof item.links === 'object' && item.links
      ? item.links
      : { github: '#', demo: '#', docs: '#' },
    content: contentHtml,
    rawMarkdown: markdownText || '',
  };
}

function applyPostDerivedState() {
  const categoryCountMap = posts.reduce((acc, post) => {
    acc[post.category] = (acc[post.category] || 0) + 1;
    return acc;
  }, {});
  categories.forEach((cat) => {
    cat.count = categoryCountMap[cat.name] || 0;
  });

  const hasPinned = posts.some((post) => post.pinned);
  if (!hasPinned) {
    posts
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .forEach((post, idx) => {
        post.pinned = idx < 4;
      });
  }
}

async function loadPostsFromManifest() {
  const response = await fetch(postDataSource.manifestPath, {
    cache: 'no-store',
  });
  if (!response.ok) {
    throw new Error(`manifest load failed: ${response.status}`);
  }

  const manifest = await response.json();
  if (!Array.isArray(manifest) || manifest.length === 0) {
    throw new Error('manifest empty');
  }

  const fetchedPosts = await Promise.all(
    manifest.map(async (item, index) => {
      if (!item.file) return normalizeLoadedPost(item, '', index);
      const markdownResponse = await fetch(item.file, { cache: 'no-store' });
      const markdownText = markdownResponse.ok
        ? await markdownResponse.text()
        : '';
      return normalizeLoadedPost(item, markdownText, index);
    }),
  );
  posts = fetchedPosts;
  applyPostDerivedState();
}

async function loadProjectsFromManifest() {
  const response = await fetch(projectDataSource.manifestPath, {
    cache: 'no-store',
  });
  if (!response.ok) {
    throw new Error(`project manifest load failed: ${response.status}`);
  }

  const manifest = await response.json();
  if (!Array.isArray(manifest) || manifest.length === 0) {
    throw new Error('project manifest empty');
  }

  const fetchedProjects = await Promise.all(
    manifest.map(async (item, index) => {
      const file = item.file;
      if (!file) return normalizeLoadedProject(item, '', index);
      const markdownResponse = await fetch(file, { cache: 'no-store' });
      const markdownText = markdownResponse.ok
        ? await markdownResponse.text()
        : '';
      return normalizeLoadedProject(item, markdownText, index);
    }),
  );
  projectsData = fetchedProjects;
}

function router() {
  const hash = location.hash || '#/';
  const hashPath = hash.split('?')[0];
  const app = document.getElementById('app');

  // 统一导航高亮（桌面 + 移动）
  let activeNavHref = '';
  if (hashPath === '#/' || hashPath.startsWith('#/post/')) {
    activeNavHref = '#/';
  } else if (hashPath === '#/categories' || hashPath.startsWith('#/category/')) {
    activeNavHref = '#/categories';
  } else if (hashPath === '#/tags' || hashPath.startsWith('#/tag/')) {
    activeNavHref = '#/tags';
  } else if (hashPath === '#/projects' || hashPath.startsWith('#/project/')) {
    activeNavHref = '#/projects';
  } else if (hashPath === '#/about') {
    activeNavHref = '#/about';
  }

  document.querySelectorAll('.nav-link').forEach(link => {
    const href = link.getAttribute('href');
    const isActive = href === activeNavHref;
    if (isActive) {
      link.classList.add(
        'dark:text-white',
        'text-[#111]',
        'font-medium',
        'dark:bg-[rgba(255,255,255,0.08)]',
        'bg-[rgba(0,0,0,0.05)]'
      );
      link.classList.remove('dark:text-[#888]', 'text-[#888]');
    } else {
      link.classList.remove(
        'dark:text-white',
        'text-[#111]',
        'font-medium',
        'dark:bg-[rgba(255,255,255,0.08)]',
        'bg-[rgba(0,0,0,0.05)]'
      );
      link.classList.add('dark:text-[#888]', 'text-[#888]');
    }
  });

  document.querySelectorAll('.mobile-nav-link').forEach(link => {
    const href = link.getAttribute('href');
    const isActive = href === activeNavHref;
    if (isActive) {
      link.classList.add(
        'dark:text-white',
        'text-[#111]',
        'font-medium',
        'dark:bg-[rgba(255,255,255,0.08)]',
        'bg-[rgba(0,0,0,0.05)]',
        'rounded-md',
        'px-2'
      );
      link.classList.remove('dark:text-[#aaa]', 'text-[#666]');
    } else {
      link.classList.remove(
        'dark:text-white',
        'text-[#111]',
        'font-medium',
        'dark:bg-[rgba(255,255,255,0.08)]',
        'bg-[rgba(0,0,0,0.05)]',
        'rounded-md',
        'px-2'
      );
      link.classList.add('dark:text-[#aaa]', 'text-[#666]');
    }
  });

  // 解析路由
  if (hashPath === '#/' || hashPath === '') {
    renderHome(app);
  } else if (hashPath.startsWith('#/post/')) {
    const slug = hash.replace('#/post/', '');
    renderPost(app, slug);
  } else if (hashPath === '#/categories') {
    renderCategories(app);
  } else if (hashPath.startsWith('#/category/')) {
    const name = decodeURIComponent(hash.replace('#/category/', ''));
    renderCategoryPosts(app, name);
  } else if (hashPath === '#/tags') {
    renderTags(app);
  } else if (hashPath.startsWith('#/tag/')) {
    const tag = decodeURIComponent(hash.replace('#/tag/', ''));
    renderTagPosts(app, tag);
  } else if (hashPath === '#/projects') {
    renderProjects(app);
  } else if (hashPath.startsWith('#/project/')) {
    const slug = hash.replace('#/project/', '');
    renderProjectDetail(app, slug);
  } else if (hashPath === '#/about') {
    renderAbout(app);
  } else {
    render404(app);
  }

  const isPostRoute = hash.startsWith('#/post/');
  const isProjectRoute = hash.startsWith('#/project/');
  const runImmediateEnhancements = () => {
    renderLucideIconsSafely();
    installImageFallbacks(app);
    // 立即初始化 reveal，避免关于页内容延迟出现
    initReveal();
  };
  const runDeferredEnhancements = () => {
    if ((isPostRoute || isProjectRoute) && typeof renderMathInElement === 'function') {
      renderMathInElement(app, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false });
    }
    if (isPostRoute || isProjectRoute) {
      renderMermaidDiagrams(app);
    }
    if (isPostRoute || isProjectRoute) {
      wrapCodeBlocks(app);
      styleDetailsElements(app);
    }
    if ((isPostRoute || isProjectRoute) && typeof hljs !== 'undefined') {
      app.querySelectorAll('pre code').forEach(block => { hljs.highlightElement(block); });
    }
    if (isPostRoute || isProjectRoute) {
      initImageLightbox();
      initPostToc();
    }
    // 初始化懒加载
    initLazyLoading();
  };
  requestAnimationFrame(runImmediateEnhancements);
  if (typeof requestIdleCallback === 'function') {
    requestIdleCallback(runDeferredEnhancements, { timeout: 120 });
  } else {
    setTimeout(runDeferredEnhancements, 30);
  }

  window.scrollTo({top: 0, behavior: 'instant'});
  // 添加页面切换动画
  app.classList.remove('page-transition');
  app.offsetHeight; // 强制重排
  app.classList.add('page-transition');
}

                <div class="flex items-center gap-2 mt-3 text-[10px] dark:text-[#555] text-[#bbb]">

                  <span id="view-count-related-${p.slug}" class="hidden flex items-center gap-1">

  // 初始化浏览量统计
  setTimeout(() => {

    const relatedPosts = getRelatedPosts(post, 3);
    relatedPosts.forEach(p => {

// 标签页
function renderTags(app) {
  // 统计所有标签及其文章数量
  const tagMap = new Map();
  posts.forEach(post => {
    post.tags.forEach(tag => {
      if (!tagMap.has(tag)) {
        tagMap.set(tag, []);
      }
      tagMap.get(tag).push(post);
    });
  });

  // 按文章数量排序
  const sortedTags = Array.from(tagMap.entries())
    .sort((a, b) => b[1].length - a[1].length);

  // 计算标签的字体大小（基于文章数量）
  const maxCount = Math.max(...sortedTags.map(([_, posts]) => posts.length));
  const minCount = Math.min(...sortedTags.map(([_, posts]) => posts.length));

  const getFontSize = (count) => {
    if (maxCount === minCount) return 1;
    const ratio = (count - minCount) / (maxCount - minCount);
    return 0.875 + ratio * 0.75; // 0.875rem ~ 1.625rem
  };

  app.innerHTML = `
    <section class="max-w-5xl mx-auto px-6 pt-24 md:pt-28 pb-20">
      <div class="reveal mb-12">
        <p class="text-sm font-mono dark:text-[#00e5a0] text-[#00a870] mb-4 tracking-wider">TAGS</p>
        <h1 class="font-serif text-3xl md:text-4xl font-bold dark:text-white text-[#111] mb-4">标签云</h1>
        <p class="dark:text-[#888] text-[#777] mb-8 max-w-xl">通过标签快速找到感兴趣的主题，每个标签代表一个技术领域或知识点。</p>

        <!-- 统计信息 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          <div class="p-4 rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#1e1e1e] border-[#eee] border">
            <div class="text-2xl font-bold dark:text-white text-[#111] mb-1">${sortedTags.length}</div>
            <div class="text-xs dark:text-[#666] text-[#999]">标签总数</div>
          </div>
          <div class="p-4 rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#1e1e1e] border-[#eee] border">
            <div class="text-2xl font-bold dark:text-white text-[#111] mb-1">${posts.length}</div>
            <div class="text-xs dark:text-[#666] text-[#999]">文章总数</div>
          </div>
          <div class="p-4 rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#1e1e1e] border-[#eee] border">
            <div class="text-2xl font-bold dark:text-white text-[#111] mb-1">${maxCount}</div>
            <div class="text-xs dark:text-[#666] text-[#999]">最热标签</div>
          </div>
          <div class="p-4 rounded-lg dark:bg-[#0f0f0f] bg-white dark:border-[#1e1e1e] border-[#eee] border">
            <div class="text-2xl font-bold dark:text-white text-[#111] mb-1">${(posts.length / sortedTags.length).toFixed(1)}</div>
            <div class="text-xs dark:text-[#666] text-[#999]">平均文章数</div>
          </div>
        </div>
      </div>

      <!-- 标签云 -->
      <div class="reveal p-8 rounded-xl dark:bg-[#0a0a0a] bg-[#fafafa] dark:border-[#1a1a1a] border-[#eee] border">
        <div class="flex flex-wrap items-center justify-center gap-4 leading-relaxed">
          ${sortedTags.map(([tag, tagPosts]) => {
            const fontSize = getFontSize(tagPosts.length);
            const opacity = 0.6 + (fontSize - 0.875) / 0.75 * 0.4;
            return `
              <a href="#/tag/${encodeURIComponent(tag)}"
                 class="group inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full dark:bg-[rgba(0,229,160,0.05)] bg-[rgba(0,180,125,0.04)] dark:hover:bg-[rgba(0,229,160,0.12)] hover:bg-[rgba(0,180,125,0.08)] transition-all hover:scale-110"
                 style="font-size: ${fontSize}rem; opacity: ${opacity};">
                <span class="font-medium dark:text-[#00e5a0] text-[#00a870]">#${tag}</span>
                <span class="text-[0.7em] opacity-70">${tagPosts.length}</span>
              </a>
            `;
          }).join('')}
        </div>
      </div>

  const tagFilter = hashQuery.get('tag') || '全部';
  const yearFilter = hashQuery.get('year') || '全部';

  const statusOptions = ['全部', ...new Set(projectsData.map((project) => project.status))];
  const tagOptions = ['全部', ...new Set(projectsData.flatMap((project) => project.tags))];
  const yearOptions = ['全部', ...new Set(projectsData.map((project) => getProjectYear(project.period)))];

  const filteredProjects = projectsData.filter((project) => {
    const statusMatched = statusFilter === '全部' || project.status === statusFilter;
    const tagMatched = tagFilter === '全部' || project.tags.includes(tagFilter);

            </a>
          `).join('')}

        ${filteredProjects.length === 0 ? `

            没有匹配项目，试试调整筛选条件。
          </div>
        ` : ''}
      `}
    </section>
  `;

  if (projectsData.length > 0) {
    const statusSelect = document.getElementById('projectFilterStatus');
    const tagSelect = document.getElementById('projectFilterTag');
    const yearSelect = document.getElementById('projectFilterYear');
    const bindFilterEvent = () => {
      const next = new URLSearchParams();
      if (statusSelect.value !== '全部') next.set('status', statusSelect.value);
      if (tagSelect.value !== '全部') next.set('tag', tagSelect.value);
      if (yearSelect.value !== '全部') next.set('year', yearSelect.value);
      const query = next.toString();
      location.hash = query ? `#/projects?${query}` : '#/projects';

    statusSelect.addEventListener('change', bindFilterEvent);
    tagSelect.addEventListener('change', bindFilterEvent);
    yearSelect.addEventListener('change', bindFilterEvent);
  }

  // 初始化项目卡片的浏览量显示
  setTimeout(() => {
    filteredProjects.forEach(project => {
      displayViewCount(project.slug, `view-count-card-${project.slug}`, 'project');
    });
  }, 100);
}

// 滚动渐显
function initReveal() {
  const pending = [...document.querySelectorAll('.reveal:not(.visible)')];
  if (pending.length === 0) return;

  const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
  pending.forEach((el) => {
    const rect = el.getBoundingClientRect();
    // 首屏可见元素立即显示，避免必须滚动才触发 observer
    if (rect.top < viewportHeight * 0.95 && rect.bottom > 0) {
      el.classList.add('visible');
    }
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -8% 0px' });

  document.querySelectorAll('.reveal:not(.visible)').forEach((el) => observer.observe(el));
}

// 获取相关推荐文章（基于标签匹配）
function getRelatedPosts(currentPost, limit = 3) {
  if (!currentPost || !currentPost.tags || currentPost.tags.length === 0) {
    return [];
  }

  // 计算每篇文章与当前文章的相关度
  const scored = posts
    .filter(p => p.slug !== currentPost.slug) // 排除当前文章
    .map(p => {
      let score = 0;

      // 1. 标签关联度分析（使用 Jaccard 相似度）
      const currentTags = new Set(currentPost.tags.map(t => t.toLowerCase()));
      const postTags = new Set(p.tags.map(t => t.toLowerCase()));
      const intersection = new Set([...currentTags].filter(x => postTags.has(x)));
      const union = new Set([...currentTags, ...postTags]);
      const jaccardSimilarity = intersection.size / union.size;
      score += jaccardSimilarity * 100; // 标签相似度权重最高

      // 2. 共同标签数量加分
      const commonTags = intersection.size;
      score += commonTags * 15;

      // 3. 同分类加分
      if (p.category === currentPost.category) {
        score += 20;
      }

      // 4. 同系列加分（如果有 series 字段）
      if (currentPost.series && p.series && currentPost.series === p.series) {
        score += 50;
      }

      // 5. 时间接近度加分（越新越好）
      const daysDiff = Math.abs(new Date(p.date) - new Date(currentPost.date)) / (1000 * 60 * 60 * 24);
      if (daysDiff < 30) score += 5;
      else if (daysDiff < 90) score += 3;
      else if (daysDiff < 180) score += 1;

      return {
        post: p,
        score,
        commonTags: Array.from(intersection),
        similarity: jaccardSimilarity
      };
    })
    .filter(item => item.score > 0) // 只保留有相关性的
    .sort((a, b) => b.score - a.score) // 按分数降序
    .slice(0, limit) // 取前 N 篇
    .map(item => ({
      ...item.post,
      _relatedMeta: {
        score: item.score,
        commonTags: item.commonTags,
        similarity: item.similarity
      }
    }));

  return scored;
}

/** PostgREST RPC 返回标量 bigint 时的解析 */
function parseRpcCountResponse(text) {
  const t = String(text || '').trim();
  try {
    const j = JSON.parse(t);
    if (typeof j === 'number' && Number.isFinite(j)) return j;
    if (Array.isArray(j) && j.length && typeof j[0] === 'number') return j[0];
  } catch (_) { /* empty */ }
  const n = Number(t);
  return Number.isFinite(n) ? n : null;
}

async function postSupabaseViewHit(slug, kind) {
  const base = String(siteMeta.supabaseUrl || '').trim().replace(/\/$/, '');
  const url = `${base}/rest/v1/rpc/increment_page_view`;
  const r = await fetch(url, {
    method: 'POST',
    headers: supabaseRestHeaders(),
    body: JSON.stringify({ p_slug: slug, p_kind: kind }),
    mode: 'cors',
    cache: 'no-store',
  });
  const text = await r.text();
  if (!r.ok) return null;
  return parseRpcCountResponse(text);
}

async function fetchSupabaseViewCount(slug, kind) {
  const base = String(siteMeta.supabaseUrl || '').trim().replace(/\/$/, '');
  const url = `${base}/rest/v1/rpc/get_page_view`;
  const r = await fetch(url, {
    method: 'POST',
    headers: supabaseRestHeaders(),
    body: JSON.stringify({ p_slug: slug, p_kind: kind }),
    mode: 'cors',
    cache: 'no-store',
  });
  const text = await r.text();
  if (!r.ok) return null;
  return parseRpcCountResponse(text);
}

async function postRemoteViewHit(slug, kind) {
  const mode = remoteCounterMode();
  if (mode === 'supabase') return postSupabaseViewHit(slug, kind);
  const base = viewCounterBase();
  if (mode !== 'http' || !base) return null;
  const r = await fetch(`${base}/hit`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slug, kind }),
    mode: 'cors',
    cache: 'no-store',
  });
  if (!r.ok) return null;
  const j = await r.json();
  return typeof j.count === 'number' ? j.count : null;
}

async function fetchRemoteViewCount(slug, kind) {
  const mode = remoteCounterMode();
  if (mode === 'supabase') return fetchSupabaseViewCount(slug, kind);
  const base = viewCounterBase();
  if (mode !== 'http' || !base) return null;
  const url = `${base}/count?slug=${encodeURIComponent(slug)}&kind=${encodeURIComponent(kind)}`;
  const r = await fetch(url, { mode: 'cors', cache: 'no-store' });
  if (!r.ok) return null;
  const j = await r.json();
  return typeof j.count === 'number' ? j.count : null;
}

function readLocalViewCount(slug, kind) {
  try {
    const stored = localStorage.getItem(VIEW_STORAGE_KEY);
    if (!stored) return 0;
    const viewData = JSON.parse(stored);
    const key = `${kind}:${slug}`;
    if (typeof viewData[key] === 'number') return viewData[key];
    if (kind === 'post' && typeof viewData[slug] === 'number') return viewData[slug];
  } catch (e) {
    console.error('读取浏览量数据失败:', e);
  }
  return 0;
}

function writeLocalViewCount(slug, kind, count) {
  try {
    const stored = localStorage.getItem(VIEW_STORAGE_KEY);
    let viewData = stored ? JSON.parse(stored) : {};
    if (typeof viewData !== 'object' || viewData === null) viewData = {};
    const key = `${kind}:${slug}`;
    viewData[key] = count;
    if (kind === 'post' && Object.prototype.hasOwnProperty.call(viewData, slug)) {
      delete viewData[slug];
    }
    localStorage.setItem(VIEW_STORAGE_KEY, JSON.stringify(viewData));
  } catch (e) {
    console.error('写入浏览量数据失败:', e);
  }
}

/** 同一会话内同一 slug 只计 1 次 PV（刷新不计）。全站共享计数需配置 Supabase 或自建 HTTP API */
function bumpLocalViewCount(slug, kind) {
  const sessionKey = `vc_seen_${kind}_${slug}`;
  const already = sessionStorage.getItem(sessionKey);
  let count = readLocalViewCount(slug, kind);
  if (!already) {
    sessionStorage.setItem(sessionKey, '1');
    count += 1;
    writeLocalViewCount(slug, kind, count);
  }
  return count;
}

async function bumpViewCount(slug, kind) {
  const sessionKey = `vc_seen_${kind}_${slug}`;
  const mode = remoteCounterMode();

  if (mode) {
    try {
      if (!sessionStorage.getItem(sessionKey)) {
        const remote = await postRemoteViewHit(slug, kind);
        if (remote != null) {
          sessionStorage.setItem(sessionKey, '1');
          writeLocalViewCount(slug, kind, remote);
          return remote;
        }
      } else {
        const cur = await fetchRemoteViewCount(slug, kind);
        if (cur != null) {
          writeLocalViewCount(slug, kind, cur);
          return cur;
        }
      }
    } catch (e) {
      console.warn('远程浏览量:', e);
    }
  }

  return bumpLocalViewCount(slug, kind);
}

function formatViewCount(n) {
  const v = Number(n) || 0;
  if (v >= 1000000) return `${(v / 1000000).toFixed(1).replace(/\.0$/, '')}M`;
  if (v >= 1000) return `${(v / 1000).toFixed(1).replace(/\.0$/, '')}k`;
  return String(v);
}

function setViewCountElement(elementId, count) {
  const el = document.getElementById(elementId);
  if (!el) return;
  const textEl = el.querySelector('span');
  if (textEl) textEl.textContent = formatViewCount(count);
  el.classList.remove('hidden');
}

async function updateViewCount(slug, kind = 'post') {
  try {
    const count = await bumpViewCount(slug, kind);
    setViewCountElement(`view-count-${slug}`, count);
  } catch (e) {
    console.warn('updateViewCount:', e);
    setViewCountElement(`view-count-${slug}`, readLocalViewCount(slug, kind));
  }
}

function getViewCount(slug, kind = 'post') {
  return readLocalViewCount(slug, kind);
}

async function displayViewCount(slug, elementId, kind = 'post') {
  const mode = remoteCounterMode();
  let count = null;
  if (mode) {
    try {
      count = await fetchRemoteViewCount(slug, kind);
    } catch (e) {
      console.warn('拉取远程浏览量失败:', e);
    }
  }
  if (count === null || count === undefined) {
    count = readLocalViewCount(slug, kind);
  } else if (mode) {
    writeLocalViewCount(slug, kind, count);
  }
  setViewCountElement(elementId, count);
}

/** 同一 slug 多处展示：只拉取一次计数，更新多个 DOM（避免列表 mobile/desktop 重复请求） */
async function displayViewCountMulti(slug, kind, elementIds) {
  const ids = (elementIds || []).filter(Boolean);
  if (!ids.length) return;
  const mode = remoteCounterMode();
  let count = null;
  if (mode) {
    try {
      count = await fetchRemoteViewCount(slug, kind);
    } catch (e) {
      console.warn('拉取远程浏览量失败:', e);
    }
  }
  if (count === null || count === undefined) {
    count = readLocalViewCount(slug, kind);
  } else if (mode) {
    writeLocalViewCount(slug, kind, count);
  }
  const label = formatViewCount(count);
  ids.forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    const textEl = el.querySelector('span');
    if (textEl) textEl.textContent = label;
    el.classList.remove('hidden');
  });
}

function hydrateListViewCounts(items, idPrefix, kind = 'post', dualSlot = false) {
  if (!items || !items.length) return;
  items.forEach((item) => {
    if (dualSlot) {
      displayViewCountMulti(item.slug, kind, [
        `${idPrefix}-${item.slug}-m`,
        `${idPrefix}-${item.slug}-d`,
      ]);
    } else {
      displayViewCount(item.slug, `${idPrefix}-${item.slug}`, kind);
    }
  });
}

// 复制分享链接
async function copyShareLink(slug) {
  const baseUrl = 'https://tangentllm.github.io/weblog/';
  const url = `${baseUrl}#/post/${slug}`;

  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(url);
    } else {
      // 降级方案
      const textArea = document.createElement('textarea');
      textArea.value = url;
      textArea.style.position = 'fixed';
      textArea.style.left = '-999999px';
      textArea.style.top = '0';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
    }

    // 显示成功提示
    showToast('链接已复制到剪贴板');
  } catch (err) {
    console.error('复制失败:', err);
    showToast('复制失败，请手动复制', 'error');
  }
}

// Toast 提示
function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.style.cssText = `
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.875rem;

// 图片懒加载
function initLazyLoading() {
  if ('IntersectionObserver' in window) {
    const imageObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          const src = img.getAttribute('data-src');
          if (src) {
            img.src = src;
            img.removeAttribute('data-src');
          }
          observer.unobserve(img);
        }
      });
    }, {
      rootMargin: '50px'
    });

    document.querySelectorAll('img[data-src]').forEach(img => {
      imageObserver.observe(img);
    });
  } else {
    // 不支持 IntersectionObserver 时直接加载所有图片
    document.querySelectorAll('img[data-src]').forEach(img => {
      img.src = img.getAttribute('data-src');
      img.removeAttribute('data-src');
    });
  }
}

function wrapCodeBlocks(scope = document) {
  const preTags = scope.querySelectorAll('.prose pre:not(.code-block pre)');
  preTags.forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;

    // 跳过已经被包装的
    if (pre.parentElement?.classList.contains('code-block')) return;

    // 获取语言类型
    const langMatch = code.className.match(/language-(\w+)/);
    const lang = langMatch ? langMatch[1] : 'text';

    // 创建包装器
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block';

    // 创建头部（只显示语言，不显示复制按钮）
    const header = document.createElement('div');
    header.className = 'code-header';
    header.innerHTML = `<span>${lang}</span>`;

    // 包装代码块
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(header);
    wrapper.appendChild(pre);
  });
}

function styleDetailsElements(scope = document) {
  const detailsElements = scope.querySelectorAll('.prose details');
  detailsElements.forEach(details => {
    if (!details.classList.contains('collapse-details')) {
      details.classList.add('collapse-details');
    }

    const summary = details.querySelector('summary');
    if (summary && !summary.classList.contains('collapse-summary')) {
      summary.classList.add('collapse-summary');

      // 添加展开/收起图标
      if (!summary.querySelector('.collapse-icon')) {
        const icon = document.createElement('span');
        icon.className = 'collapse-icon';
        icon.textContent = '▶';
        summary.insertBefore(icon, summary.firstChild);
      }
    }

    // 为 summary 之后的所有内容添加包装
    const children = Array.from(details.children);
    const summaryIndex = children.indexOf(summary);
    if (summaryIndex !== -1 && summaryIndex < children.length - 1) {
      // 检查是否已经有 collapse-content 包装
      const hasWrapper = children.some(child =>
        child.classList && child.classList.contains('collapse-content')
      );

      if (!hasWrapper) {
        const wrapper = document.createElement('div');
        wrapper.className = 'collapse-content';

        // 将 summary 之后的所有元素移到 wrapper 中
        for (let i = summaryIndex + 1; i < children.length; i++) {
          wrapper.appendChild(children[i]);
        }

        details.appendChild(wrapper);
      }
    }
  });
}

function renderMermaidDiagrams(scope = document) {
  if (typeof mermaid === 'undefined') return;
  if (!renderMermaidDiagrams.initialized) {
    mermaid.initialize({
      startOnLoad: false,
      theme: document.documentElement.classList.contains('dark') ? 'dark' : 'default',
      securityLevel: 'loose',
    });
    renderMermaidDiagrams.initialized = true;
  }

  const blocks = scope.querySelectorAll('pre code.language-mermaid');
  blocks.forEach((codeNode, idx) => {
    const pre = codeNode.closest('pre');
    if (!pre) return;
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.id = `mermaid-${Date.now()}-${idx}`;
    div.textContent = codeNode.textContent || '';
    pre.replaceWith(div);
  });

  const nodes = scope.querySelectorAll('.mermaid');
  if (nodes.length > 0) {
    mermaid.run({ nodes });
  }
}

// 文章TOC跟随
function initPostToc() {
  const sidebar = document.getElementById('toc-sidebar');
  if (!sidebar) return;
  const tocNav = sidebar.querySelector('.toc-nav');
  const links = sidebar.querySelectorAll('.toc-link');
  if (links.length === 0) return;

  // 创建指示条元素
  const indicator = document.createElement('div');
  indicator.className = 'toc-indicator';
  tocNav.appendChild(indicator);

  // 更新指示条位置
  function updateIndicator(activeLink) {
    if (!activeLink) {
      indicator.style.opacity = '0';
      return;
    }
    const linkRect = activeLink.getBoundingClientRect();
    const navRect = tocNav.getBoundingClientRect();
    const offsetTop = activeLink.offsetTop;
    const height = linkRect.height;

    indicator.style.height = `${height}px`;
    indicator.style.transform = `translateY(${offsetTop}px)`;
    indicator.style.opacity = '1';
  }

  // 添加点击事件处理，阻止默认跳转
  links.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const targetId = link.dataset.target;
      const target = document.getElementById(targetId);
      if (target) {
        const headerOffset = 80; // 顶部导航栏高度
        const elementPosition = target.getBoundingClientRect().top;
        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

        window.scrollTo({
          top: offsetPosition,
          behavior: 'smooth'
        });

        // 更新 active 状态和指示条
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        updateIndicator(link);
      }
    });
  });

  const observer = new IntersectionObserver((entries) => {
    // 找到所有正在相交的条目
    const intersectingEntries = entries.filter(entry => entry.isIntersecting);

    if (intersectingEntries.length > 0) {
      // 如果有多个相交，选择最靠近顶部的那个
      const topmost = intersectingEntries.reduce((prev, curr) => {
        return curr.boundingClientRect.top < prev.boundingClientRect.top ? curr : prev;
      });

      links.forEach(l => l.classList.remove('active'));
      const active = sidebar.querySelector(`[data-target="${topmost.target.id}"]`);
      if (active) {
        active.classList.add('active');
        updateIndicator(active);
      }
    }
  }, { rootMargin: '-80px 0px -70% 0px' });

  links.forEach(link => {
    const target = document.getElementById(link.dataset.target);
    if (target) observer.observe(target);
  });

  // 初始化指示条位置
  setTimeout(() => {
    const activeLink = sidebar.querySelector('.toc-link.active');
    if (activeLink) {
      updateIndicator(activeLink);
    } else if (links.length > 0) {
      links[0].classList.add('active');
      updateIndicator(links[0]);
    }
  }, 100);
}
